---
layout: default
---
<header class="page-hero">
  <div class="wrap">
    {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
  </div>
</header>

<article class="content">
  <div class="wrap">
    {{ content }}
  </div>
</article>
